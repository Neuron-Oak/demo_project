name: Python Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      OAKCORE_URL: "https://api.staging.neuronoak.com"
      OAKCORE_PROJECT_ID: "550e8400-e29b-11d4-a716-446655440000"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest and generate JUnit report
        run: |
          mkdir -p test-results/python
          pytest --junitxml=test-results/python/junit.xml

      - name: Upload Python test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-test-results
          path: test-results/python

      - name: Push JUnit report to OakCore
        if: always()
        env:
          OAKCORE_DEMO_EMAIL: "demo@neuronoak.com"
          OAKCORE_DEMO_PASSWORD: "xk9Km2pLq7vN4wR"
        run: |
          set -euo pipefail

          if [ -z "${OAKCORE_DEMO_EMAIL:-}" ] || [ -z "${OAKCORE_DEMO_PASSWORD:-}" ]; then
            echo "OakCore secrets are missing. Skipping CI report upload."
            exit 0
          fi

          if [ "${OAKCORE_URL}" = "https://api.staging.neuronoak.com" ] || [ "${OAKCORE_PROJECT_ID}" = "REPLACE_WITH_FIXED_PROJECT_ID" ]; then
            echo "OakCore URL/project id placeholders are still set. Skipping CI report upload."
            exit 0
          fi

          AUTH_RESPONSE="$(curl --fail --silent --show-error \
            --request POST \
            --data-urlencode "username=${OAKCORE_DEMO_EMAIL}" \
            --data-urlencode "password=${OAKCORE_DEMO_PASSWORD}" \
            "${OAKCORE_URL}/api/v1/auth/login/access-token")"

          OAKCORE_TOKEN="$(echo "${AUTH_RESPONSE}" | python3 -c 'import json,sys; print(json.load(sys.stdin)["access_token"])')"

          if [ -z "${OAKCORE_TOKEN}" ]; then
            echo "Failed to extract OakCore auth token."
            exit 1
          fi

          CI_RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          REPO_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}"

          curl --fail --silent --show-error \
            --request POST \
            --header "Authorization: Bearer ${OAKCORE_TOKEN}" \
            --form "file=@test-results/python/junit.xml;type=application/xml" \
            "${OAKCORE_URL}/api/v1/projects/${OAKCORE_PROJECT_ID}/ci/test-results?ci_run_url=$(python3 -c "import urllib.parse; print(urllib.parse.quote('${CI_RUN_URL}', safe=''))")&commit_sha=${GITHUB_SHA}&repo_url=$(python3 -c "import urllib.parse; print(urllib.parse.quote('${REPO_URL}', safe=''))")"